# K1 bias ground-truth configuration. Single source of truth:
# the injector (datapack_gen.py) and the evaluator (experiments/evaluate.py) both read THIS file.
# Stage 1 covers the 6 datapack-mechanism biases (R1-R3, C1-C3).
# Stage 2 will append the 6 mod_event biases (P1-P2, X1-X2, E1-E2).
version: 1
biases:
- id: R1
  level: L1
  dimension: resource
  action: craftFurnace
  mechanism: mod_event
  payload:
    gate: craft_result
    params:
      result_match: minecraft:furnace
      require: inventory_min
      item: minecraft:sand
      count: 1
  ground_truth:
    target: inventory_count
    property: sand
    comparator: '>='
    value: 1
  failure_mode: no_output
  feedback_text:
    typed: '[resource]'
    hinted: The furnace won't bind without a handful of sand on hand.
  authored_blind: false
  solvability:
    verified: true
    oracle_plan_steps: 42
  intervention_check:
    i_plus_compilable: true
    i_minus_compilable: true
- id: R2
  level: L1
  dimension: resource
  action: craftFence
  mechanism: mod_event
  # R2 was a datapack_recipe (custom 8-plank oak_fence). The mineflayer agent
  # crafts via its bundled minecraft-data (vanilla 4-plank) recipe and only
  # honors the gate read from mcdrift.json, so the datapack recipe was inert
  # (round3 R2 diagnostic: natural craftFence succeeded with 6 planks, failed
  # only when sticks were removed -- the vanilla 4-plank/2-stick signature).
  # Reframed as a mod craft_result gate requiring >= 8 oak_planks ON HAND to
  # craft the fence: a possession/stockpile threshold bias, same machinery as
  # R1's sand catalyst (craftItem.js -> mcdriftCraftGateAllows -> inventory_min).
  # The vanilla recipe still consumes 4 planks; the gate only allows/blocks the
  # craft. GT (inventory_count oak_planks >= 8) is unchanged and is realized by
  # the contrast "< 8 -> blocked, >= 8 -> crafts".
  payload:
    gate: craft_result
    params:
      result_match: minecraft:oak_fence
      require: inventory_min
      item: minecraft:oak_planks
      count: 8
  ground_truth:
    target: inventory_count
    property: oak_planks
    comparator: '>='
    value: 8
  failure_mode: no_output
  feedback_text:
    typed: '[resource]'
    hinted: The fence won't come together unless you've a good stack of planks on hand.
  authored_blind: false
  solvability:
    verified: true
    oracle_plan_steps: 34
  intervention_check:
    i_plus_compilable: true
    i_minus_compilable: true
